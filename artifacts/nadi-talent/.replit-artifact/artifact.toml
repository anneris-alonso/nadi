kind = "web"
previewPath = "/"
title = "NADI Talent Group"
version = "1.0.0"
id = "artifacts/nadi-talent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22546

[services.development]
run = "pnpm --filter @workspace/nadi-talent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nadi-talent", "run", "build" ]
publicDir = "artifacts/nadi-talent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22546"
BASE_PATH = "/"
